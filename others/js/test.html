<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Fixed Button Test</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="app">
    <!-- Trigger Button -->
    <div class="p-8">
      <button 
        @click="isOpen = true"
        class="bg-blue-500 text-white px-4 py-2 rounded"
      >
        Open Modal
      </button>
    </div>

    <Teleport to="body">
      <!-- Overlay -->
      <div
        v-if="isOpen"
        class="fixed z-50 top-0 left-0 w-screen h-screen bg-gray-400 bg-opacity-30 backdrop-blur-sm"
        @click.self="isOpen = false"
      >
        <!-- Modal -->
        <div
          class="bg-white fixed w-full md:w-3/4 max-w-[1024px] h-[100dvh] md:h-auto top-0 left-0 md:top-1/2 md:left-1/2 z-10 md:-translate-x-1/2 md:-translate-y-1/2"
        >
          <!-- Content -->
          <img
            src="https://picsum.photos/1200/800"
            alt="test"
            class="w-full h-[60vh] md:h-auto object-cover"
          />
          <div class="p-8">
            <p class="text-lg font-bold">Modal Title</p>
            <p class="text-gray-500">
              Pinch zoom on mobile to test if close button stays fixed.
            </p>
          </div>
        </div>
      </div>

      <!-- Close button — outside modal, at body level -->
      <button
        v-if="isOpen"
        @click="isOpen = false"
        class="fixed top-2 right-2 z-[999] bg-white border border-gray-300 rounded-full w-10 h-10 flex items-center justify-center shadow-lg"
      >
        ✕
      </button>
    </Teleport>
  </div>

  <script>
    const { createApp } = Vue
    createApp({
      data() {
        return {
          isOpen: false
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
